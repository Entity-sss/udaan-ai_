kind = "web"
previewPath = "/"
title = "Udaan AI - Student Growth Ecosystem"
version = "1.0.0"
id = "artifacts/udaan-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25711

[services.development]
run = "pnpm --filter @workspace/udaan-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/udaan-ai", "run", "build" ]
publicDir = "artifacts/udaan-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25711"
BASE_PATH = "/"
